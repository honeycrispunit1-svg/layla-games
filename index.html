<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This or That? 🎯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .title {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .question {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #333;
            font-weight: 600;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .choices {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-direction: column;
        }
        
        .choice-btn {
            padding: 25px;
            font-size: 1.3em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .choice-btn:first-child {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .choice-btn:last-child {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .choice-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        .choice-btn:active {
            transform: translateY(-2px);
        }
        
        .progress {
            margin-top: 20px;
            color: #666;
            font-size: 1.1em;
        }
        
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        
        .response {
            font-size: 1.3em;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            color: #667eea;
            font-weight: 600;
            display: none;
        }
        
        .response.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result {
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideUp 0.6s;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-emoji {
            font-size: 5em;
            margin: 20px 0;
        }
        
        .result-title {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .result-description {
            font-size: 1.2em;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            padding: 20px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        
        .start-screen {
            display: block;
        }
        
        .start-screen.hide {
            display: none;
        }
        
        .start-btn {
            padding: 25px 50px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            margin-top: 30px;
        }
        
        .start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
        }
        
        .game-screen {
            display: none;
        }
        
        .game-screen.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="start-screen" id="startScreen">
            <div class="title">This or That? 🎯</div>
            <div class="subtitle">Quick decisions, no overthinking!</div>
            <div style="font-size: 4em; margin: 30px 0;">🤔</div>
            <p style="color: #666; font-size: 1.1em; margin-bottom: 20px;">
                Pick your favorites and find out what kind of person you are!
            </p>
            <button class="start-btn" onclick="startGame()">Let's Go! 🚀</button>
        </div>
        
        <div class="game-screen" id="gameScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="progress" id="progress"></div>
            
            <div class="question" id="question"></div>
            
            <div class="response" id="response"></div>
            
            <div class="choices" id="choices"></div>
        </div>
        
        <div class="result" id="result">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-description" id="resultDescription"></div>
            <button class="restart-btn" onclick="restart()">Play Again! 🔄</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Coffee or Tea?",
                a: "Coffee",
                b: "Tea",
                responses: {
                    a: "☕ Go-getter energy! You like to get things DONE!",
                    b: "🍵 Chill vibes! You know how to relax!"
                }
            },
            {
                q: "Beach or Mountains?",
                a: "Beach",
                b: "Mountains",
                responses: {
                    a: "🏖️ Sun-seeker! You're all about that vitamin D!",
                    b: "⛰️ Adventure calls! You love a good view!"
                }
            },
            {
                q: "Pizza or Tacos?",
                a: "Pizza",
                b: "Tacos",
                responses: {
                    a: "🍕 Classic choice! Can't go wrong with pizza!",
                    b: "🌮 Spicy life! You keep things interesting!"
                }
            },
            {
                q: "Morning or Night?",
                a: "Morning",
                b: "Night",
                responses: {
                    a: "🌅 Early bird! You're up while others snooze!",
                    b: "🌙 Night owl! The party starts when the sun goes down!"
                }
            },
            {
                q: "Cats or Dogs?",
                a: "Cats",
                b: "Dogs",
                responses: {
                    a: "🐱 Independent spirit! You do your own thing!",
                    b: "🐕 Loyal soul! You're ride-or-die!"
                }
            },
            {
                q: "Sweet or Salty?",
                a: "Sweet",
                b: "Salty",
                responses: {
                    a: "🍭 Life is sweet! You find joy in the little things!",
                    b: "🥨 Keep it real! You like things with flavor!"
                }
            },
            {
                q: "Movie or Book?",
                a: "Movie",
                b: "Book",
                responses: {
                    a: "🎬 Visual thinker! You love a good story on screen!",
                    b: "📚 Imagination station! Your mind paints the picture!"
                }
            },
            {
                q: "Text or Call?",
                a: "Text",
                b: "Call",
                responses: {
                    a: "💬 Thoughtful communicator! You choose your words!",
                    b: "📞 Direct approach! You say it like it is!"
                }
            },
            {
                q: "Summer or Winter?",
                a: "Summer",
                b: "Winter",
                responses: {
                    a: "☀️ Heat lover! You thrive in the sunshine!",
                    b: "❄️ Cool customer! Cozy vibes are your thing!"
                }
            },
            {
                q: "Adventure or Relaxation?",
                a: "Adventure",
                b: "Relaxation",
                responses: {
                    a: "🎢 Thrill-seeker! Life's too short to be boring!",
                    b: "🛋️ Peace finder! You know the value of downtime!"
                }
            }
        ];

        const personalities = [
            {
                emoji: "🚀",
                title: "The Go-Getter",
                description: "You're energetic, decisive, and always ready for action! You don't overthink things - you just DO. People love your confident vibe!"
            },
            {
                emoji: "🌟",
                title: "The Balanced One",
                description: "You're the perfect mix of adventure and chill! You know when to go hard and when to relax. That's a rare talent!"
            },
            {
                emoji: "😎",
                title: "The Cool Cat",
                description: "Nothing phases you! You're laid-back, confident, and always know how to have a good time. Life's a vibe and you're living it!"
            },
            {
                emoji: "🎨",
                title: "The Creative Spirit",
                description: "You see the world differently! Your choices show you're imaginative, thoughtful, and always thinking outside the box!"
            },
            {
                emoji: "💪",
                title: "The Powerhouse",
                description: "You're strong, driven, and not afraid to take charge! Your energy is contagious and you make things happen!"
            }
        ];

        let currentQuestion = 0;
        let answers = [];

        function startGame() {
            document.getElementById('startScreen').classList.add('hide');
            document.getElementById('gameScreen').classList.add('show');
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestion >= questions.length) {
                showResult();
                return;
            }

            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.q;
            document.getElementById('progress').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            
            const progressPercent = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';

            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = `
                <button class="choice-btn" onclick="makeChoice('a')">${q.a}</button>
                <button class="choice-btn" onclick="makeChoice('b')">${q.b}</button>
            `;

            document.getElementById('response').classList.remove('show');
        }

        function makeChoice(choice) {
            answers.push(choice);
            
            const q = questions[currentQuestion];
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = q.responses[choice];
            responseDiv.classList.add('show');

            setTimeout(() => {
                currentQuestion++;
                showQuestion();
            }, 1500);
        }

        function showResult() {
            document.getElementById('gameScreen').classList.remove('show');
            
            // Pick a random personality (they're all fun!)
            const personality = personalities[Math.floor(Math.random() * personalities.length)];
            
            document.getElementById('resultEmoji').textContent = personality.emoji;
            document.getElementById('resultTitle').textContent = personality.title;
            document.getElementById('resultDescription').textContent = personality.description;
            document.getElementById('result').classList.add('show');
            
            document.getElementById('progressBar').style.width = '100%';
        }

        function restart() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('result').classList.remove('show');
            document.getElementById('startScreen').classList.remove('hide');
            document.getElementById('gameScreen').classList.remove('show');
        }
    </script>
</body>
</html>
