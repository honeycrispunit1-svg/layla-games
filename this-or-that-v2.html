<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This or That? 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .question {
            text-align: center;
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .option {
            flex: 1;
            padding: 30px 20px;
            border: 3px solid #667eea;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }
        .option:hover {
            background: #667eea;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .option:active {
            transform: translateY(-2px);
        }
        .score {
            text-align: center;
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }
        .score span {
            color: #667eea;
            font-weight: bold;
            font-size: 1.3em;
        }
        .result {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .result h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .percentage {
            font-size: 2em;
            color: #764ba2;
            font-weight: bold;
            margin: 10px 0;
        }
        .restart {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .restart:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>This or That? 🎮</h1>
        <div id="game"></div>
    </div>

    <script>
        const questions = [
            { question: "Coffee or Tea?", a: "Coffee", b: "Tea" },
            { question: "Beach or Mountains?", a: "Beach", b: "Mountains" },
            { question: "Summer or Winter?", a: "Summer", b: "Winter" },
            { question: "Dog or Cat?", a: "Dog", b: "Cat" },
            { question: "Morning or Night?", a: "Morning", b: "Night" },
            { question: "Sweet or Salty?", a: "Sweet", b: "Salty" },
            { question: "Movies or Books?", a: "Movies", b: "Books" },
            { question: "Pizza or Tacos?", a: "Pizza", b: "Tacos" },
            { question: "Texting or Calling?", a: "Texting", b: "Calling" },
            { question: "Netflix or YouTube?", a: "Netflix", b: "YouTube" }
        ];

        let currentQuestion = 0;
        let playerAnswers = [];
        let partnerAnswers = [];
        let matches = 0;

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('game').innerHTML = `
                <div class="score">Question ${currentQuestion + 1} of ${questions.length}</div>
                <div class="question">${q.question}</div>
                <div class="options">
                    <div class="option" onclick="answer('a')">${q.a}</div>
                    <div class="option" onclick="answer('b')">${q.b}</div>
                </div>
            `;
        }

        function answer(choice) {
            playerAnswers.push(choice);
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                askPartner();
            }
        }

        function askPartner() {
            currentQuestion = 0;
            document.getElementById('game').innerHTML = `
                <div class="result">
                    <h2>Your turn is done! ✨</h2>
                    <p style="margin: 15px 0; color: #666;">Now hand this to your partner to answer the same questions.</p>
                </div>
                <button class="restart" onclick="partnerTurn()">Partner's Turn</button>
            `;
        }

        function partnerTurn() {
            showPartnerQuestion();
        }

        function showPartnerQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('game').innerHTML = `
                <div class="score">Partner's Question ${currentQuestion + 1} of ${questions.length}</div>
                <div class="question">${q.question}</div>
                <div class="options">
                    <div class="option" onclick="partnerAnswer('a')">${q.a}</div>
                    <div class="option" onclick="partnerAnswer('b')">${q.b}</div>
                </div>
            `;
        }

        function partnerAnswer(choice) {
            partnerAnswers.push(choice);
            if (playerAnswers[currentQuestion] === choice) {
                matches++;
            }
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showPartnerQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const percentage = Math.round((matches / questions.length) * 100);
            let message = "";
            
            if (percentage >= 80) {
                message = "You two are like twins! 🎉";
            } else if (percentage >= 60) {
                message = "Great match! You know each other well! 😊";
            } else if (percentage >= 40) {
                message = "Not bad! Some surprises in there! 🤔";
            } else {
                message = "Opposites attract! 💫";
            }

            document.getElementById('game').innerHTML = `
                <div class="result">
                    <h2>Results! 🎊</h2>
                    <div class="percentage">${percentage}%</div>
                    <p style="font-size: 1.2em; color: #667eea; margin: 10px 0;">${message}</p>
                    <p style="color: #666; margin-top: 15px;">You matched on ${matches} out of ${questions.length} questions!</p>
                </div>
                <button class="restart" onclick="restart()">Play Again</button>
            `;
        }

        function restart() {
            currentQuestion = 0;
            playerAnswers = [];
            partnerAnswers = [];
            matches = 0;
            showQuestion();
        }

        // Start the game
        showQuestion();
    </script>
</body>
</html>
